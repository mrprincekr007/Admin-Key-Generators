<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Gateway | Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #050505;
            background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.05), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(244, 114, 182, 0.05), transparent 25%);
            color: #e4e4e7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container { max-width: 420px; width: 100%; }
        .login-box {
            background: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid #3f3f46;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.2);
            text-align: left;
        }

        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header i { font-size: 55px; color: #6366f1; filter: drop-shadow(0 0 15px rgba(99,102,241,0.6)); }
        .login-header h2 { color: #fff; font-size: 24px; letter-spacing: 1px; margin-top: 15px; }
        .login-header p { color: #a1a1aa; font-size: 13px; margin-top: 5px; }

        .input-label { display: block; color: #a1a1aa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 500;}

        .input-dark {
            width: 100%; padding: 14px 18px;
            border-radius: 10px; border: 1px solid #3f3f46; background: #18181b; color: #fff;
            font-size: 14px; transition: 0.3s; margin-bottom: 20px; display: block;
        }
        .input-dark:focus { border-color: #6366f1; box-shadow: inset 0 0 10px rgba(99, 102, 241, 0.2); }

        .checkbox-container { display: flex; align-items: center; gap: 8px; color: #a1a1aa; font-size: 13px; cursor: pointer; margin-bottom: 25px; }
        .checkbox-container input { width: 16px; height: 16px; accent-color: #6366f1; cursor: pointer; }

        .btn-neon {
            background: linear-gradient(135deg, #4f46e5, #3b82f6); border: none; color: white;
            padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s;
            font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3); width: 100%;
        }
        .btn-neon:hover { box-shadow: 0 0 25px rgba(99, 102, 241, 0.6); transform: translateY(-2px); }

        #loginError { 
            color: #ef4444; font-size: 13px; text-align: center; margin-top: 15px; 
            display: none; background: rgba(239, 68, 68, 0.1); padding: 10px; 
            border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .spinner-small {
            width: 16px; height: 16px; border: 2px solid #fff; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <i class="fa-solid fa-fingerprint"></i>
                <h2>Admin Gateway</h2>
                <p>Enter your credentials to access the panel</p>
            </div>

            <span class="input-label"><i class="fa-solid fa-envelope"></i> Email Address</span>
            <input type="email" id="adminEmail" class="input-dark" placeholder="admin@example.com">

            <span class="input-label"><i class="fa-solid fa-lock"></i> Password</span>
            <input type="password" id="adminPass" class="input-dark" placeholder="••••••••">

            <label class="checkbox-container">
                <input type="checkbox" id="rememberMe">
                Remember my credentials
            </label>

            <button class="btn-neon" id="loginBtn"><i class="fa-solid fa-right-to-bracket"></i> Authenticate Login</button>
            
            <div id="loginError"><i class="fa-solid fa-circle-exclamation"></i> Incorrect Email or Password!</div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        const emailInput = document.getElementById('adminEmail');
        const passInput = document.getElementById('adminPass');
        const rememberCheck = document.getElementById('rememberMe');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('loginError');

        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('saved_admin_email')) {
                emailInput.value = localStorage.getItem('saved_admin_email');
                passInput.value = localStorage.getItem('saved_admin_pass');
                rememberCheck.checked = true;
            }
        });

        function showError(msg) {
            errorMsg.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${msg}`;
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
        }

        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passInput.value.trim();

            if(!email || !password) {
                showError("Please enter both Email and Password.");
                return;
            }

            loginBtn.innerHTML = '<span class="spinner-small"></span> Verifying...';
            loginBtn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                
                // Track Admin Login in Dashboard Activity Logs
                await push(ref(db, 'AdminLogs'), {
                    action: "Admin Login Success",
                    key: email,
                    type: "LOGIN",
                    undoData: "{}",
                    time: serverTimestamp(),
                    undone: false
                }).catch(e => console.log(e));

                if (rememberCheck.checked) {
                    localStorage.setItem('saved_admin_email', email);
                    localStorage.setItem('saved_admin_pass', password);
                } else {
                    localStorage.removeItem('saved_admin_email');
                    localStorage.removeItem('saved_admin_pass');
                }
                window.location.href = 'admin.html';
            } catch (error) {
                let msg = "Login failed!";
                switch (error.code) {
                    case 'auth/user-not-found':
                    case 'auth/wrong-password': msg = "Incorrect Email or Password!"; break;
                    case 'auth/invalid-email': msg = "Invalid Email Address!"; break;
                    case 'auth/too-many-requests': msg = "Too many attempts. Try again later."; break;
                    default: msg = error.message;
                }
                showError(msg);
                console.error("Login Error:", error);
            }

            loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Authenticate Login';
            loginBtn.disabled = false;
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>
</body>
</html>
